<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevPortal Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #f8fafc;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 1.5rem;
    }

    button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 1.5rem;
    }

    button:hover {
      background: #4338ca;
    }

    .field {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.65rem 0;
      border-bottom: 1px solid #2d3148;
      font-size: 0.9rem;
    }

    .field:last-child {
      border-bottom: none;
    }

    .label {
      color: #64748b;
    }

    .value {
      color: #a5b4fc;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.85rem;
    }

    .placeholder {
      color: #334155;
      font-style: italic;
    }

    .status {
      display: inline-block;
      font-size: 0.75rem;
      padding: 2px 10px;
      border-radius: 99px;
      margin-bottom: 1.5rem;
    }

    .status.ok {
      background: #052e16;
      color: #4ade80;
    }

    .status.waiting {
      background: #1c1917;
      color: #78716c;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>DevPortal</h1>
    <p class="subtitle">Live system info from the API container</p>

    <span class="status waiting" id="status">waiting</span><br>

    <button onclick="fetchInfo()">Fetch system info</button>

    <div id="fields">
      <div class="field"><span class="label">Environment</span><span class="value placeholder" id="env">—</span></div>
      <div class="field"><span class="label">Hostname</span><span class="value placeholder" id="hostname">—</span></div>
      <div class="field"><span class="label">OS</span><span class="value placeholder" id="os">—</span></div>
      <div class="field"><span class="label">Kernel</span><span class="value placeholder" id="kernel">—</span></div>
      <div class="field"><span class="label">Time (UTC)</span><span class="value placeholder" id="time">—</span></div>
    </div>
  </div>

  <script>
    async function fetchInfo() {
      const status = document.getElementById("status");
      status.textContent = "loading...";
      status.className = "status waiting";

      try {
        const res = await fetch("/api/info");
        const data = await res.json();

        document.getElementById("env").textContent      = data.env;
        document.getElementById("hostname").textContent = data.hostname;
        document.getElementById("os").textContent       = data.os;
        document.getElementById("kernel").textContent   = data.kernel;
        document.getElementById("time").textContent     = data.time;

        document.querySelectorAll(".value").forEach(el => el.classList.remove("placeholder"));

        status.textContent = "connected";
        status.className   = "status ok";
      } catch (err) {
        status.textContent = "error — is the API running?";
        status.className   = "status waiting";
      }
    }
  </script>
</body>
</html>
